<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YathraLanka - Download app</title>
  <style>
    :root {
      --color-teal: #1E535B;
      --color-cream: #FDF8E9;
      --color-gold: #EBB34D;
      --color-charcoal: #2B2B2B;
    }
    body {
      background-color: var(--color-cream);
      color: var(--color-charcoal);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(30, 83, 91, 0.12);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      color: var(--color-teal);
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 12px;
    }
    p {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .spinner {
      border: 4px solid rgba(30, 83, 91, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: var(--color-teal);
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .btn {
      display: inline-block;
      background-color: var(--color-teal);
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #153c42;
    }
  </style>
  <script>
    window.onload = function() {
      const WEB_DEMO_URL = "https://pabadhigaru.github.io/YathraLanka-Native/www/index.html"; 

      // Perform redirect after 1.5 seconds so the user sees the page
      setTimeout(function() {
        window.location.replace(WEB_DEMO_URL);
      }, 1500);
    };
  </script>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Launching YathraLanka...</h1>
    <p>Detecting your device to launch the interactive web application demo.</p>
    <a href="https://pabadhigaru.github.io/YathraLanka-Native/www/index.html" class="btn">Launch Web Demo</a>
  </div>
</body>
</html>
